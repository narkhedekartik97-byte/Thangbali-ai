<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Workspace</title>
  <style>
    :root {
      --bg:          #0f172a;
      --surface:     #1e293b;
      --surface2:    #273349;
      --glass:       rgba(30, 41, 59, 0.7);
      --glass-border:rgba(255,255,255,0.08);
      --accent:      #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.35);
      --accent-dark: #4f46e5;
      --text:        #f1f5f9;
      --muted:       #94a3b8;
      --bubble-user: #6366f1;
      --bubble-ai:   rgba(30, 41, 59, 0.9);
      --sidebar-w:   260px;
      --radius:      16px;
      --transition:  0.25s cubic-bezier(0.4,0,0.2,1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform var(--transition), width var(--transition);
      z-index: 50;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--glass-border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      box-shadow: 0 0 12px var(--accent-glow);
      flex-shrink: 0;
    }
    .logo-text h2 { font-size: 0.95rem; font-weight: 700; }
    .logo-text p  { font-size: 0.68rem; color: var(--muted); line-height: 1.3; margin-top: 1px; }

    #new-chat-btn {
      width: 100%;
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      border: none; border-radius: 10px;
      color: #fff; font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 14px var(--accent-glow);
    }
    #new-chat-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
    #new-chat-btn:active { transform: translateY(0); }

    .sidebar-section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 16px 6px;
    }

    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px;
    }
    #history-list::-webkit-scrollbar { width: 4px; }
    #history-list::-webkit-scrollbar-track { background: transparent; }
    #history-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      gap: 6px;
      transition: background var(--transition);
      animation: fadeSlideIn 0.2s ease;
    }
    .history-item:hover { background: var(--surface2); }
    .history-item.active { background: rgba(99,102,241,0.18); border: 1px solid rgba(99,102,241,0.25); }
    .history-item-title {
      font-size: 0.82rem; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex: 1;
    }
    .history-item-del {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 0.85rem; padding: 2px 4px;
      border-radius: 5px; opacity: 0; transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .history-item:hover .history-item-del { opacity: 1; }
    .history-item-del:hover { color: #f87171; }

    .history-empty {
      font-size: 0.78rem; color: var(--muted);
      padding: 10px 10px; text-align: center;
    }

    /* Settings panel */
    .sidebar-footer {
      border-top: 1px solid var(--glass-border);
      padding: 12px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .setting-row { display: flex; flex-direction: column; gap: 4px; }
    .setting-label { font-size: 0.72rem; color: var(--muted); font-weight: 500; }
    #model-select {
      width: 100%;
      padding: 7px 10px;
      background: var(--surface2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text); font-size: 0.82rem;
      cursor: pointer; outline: none;
      transition: border-color var(--transition);
    }
    #model-select:focus { border-color: var(--accent); }

    /* ── Main area ────────────────────────────────── */
    #main {
      flex: 1;
      display: flex; flex-direction: column;
      min-width: 0;
      position: relative;
    }

    /* Topbar (mobile) */
    #topbar {
      display: none;
      align-items: center; gap: 10px;
      padding: 12px 16px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 40;
    }
    #sidebar-toggle {
      background: none; border: none; color: var(--text);
      font-size: 1.3rem; cursor: pointer; padding: 4px;
      border-radius: 8px; transition: background var(--transition);
    }
    #sidebar-toggle:hover { background: var(--surface2); }
    #topbar-title { font-size: 0.95rem; font-weight: 600; }

    /* PDF badge */
    #pdf-badge {
      display: none;
      align-items: center; gap: 8px;
      margin: 10px 16px 0;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 0.8rem; color: #a5b4fc;
      animation: fadeSlideIn 0.25s ease;
    }
    #pdf-badge.visible { display: flex; }
    #pdf-badge span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    #pdf-badge button {
      background: none; border: none; cursor: pointer;
      color: #a5b4fc; font-size: 1rem; padding: 0; flex-shrink: 0;
      opacity: 0.7; transition: opacity 0.15s;
    }
    #pdf-badge button:hover { opacity: 1; }

    /* Chat window */
    #chat-window {
      flex: 1; overflow-y: auto;
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 16px;
    }
    #chat-window::-webkit-scrollbar { width: 5px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

    /* Welcome screen */
    #welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 24px; text-align: center;
      animation: fadeIn 0.4s ease;
    }
    .welcome-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 0 30px var(--accent-glow);
      margin-bottom: 6px;
    }
    #welcome h2 { font-size: 1.5rem; font-weight: 700; }
    #welcome p  { color: var(--muted); font-size: 0.92rem; max-width: 320px; line-height: 1.55; }

    /* Messages */
    .msg-row {
      display: flex; gap: 10px;
      animation: fadeSlideIn 0.25s ease;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.ai   { justify-content: flex-start; }

    .avatar {
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; flex-shrink: 0; margin-top: 2px;
    }
    .avatar.ai-avatar {
      background: linear-gradient(135deg, var(--accent), #a855f7);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .bubble {
      max-width: min(72%, 600px);
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg-row.user .bubble {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 14px var(--accent-glow);
    }
    .msg-row.ai .bubble {
      background: var(--bubble-ai);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .system-note {
      align-self: center;
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 10px;
      font-size: 0.78rem;
      color: #a5b4fc;
      padding: 6px 14px;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    /* Typing dots */
    .typing-dot {
      display: inline-block;
      width: 7px; height: 7px; margin: 0 2px;
      background: var(--muted);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    /* Input area */
    #input-area {
      padding: 12px 16px 16px;
    }
    #input-box {
      display: flex; align-items: flex-end; gap: 8px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 8px 8px 8px 14px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    #input-box:focus-within {
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    #user-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 0.92rem;
      resize: none; line-height: 1.5;
      max-height: 140px; overflow-y: auto;
      padding: 4px 0;
    }
    #user-input::placeholder { color: var(--muted); }
    #user-input::-webkit-scrollbar { width: 3px; }
    #user-input::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

    #upload-btn-label {
      cursor: pointer; color: var(--muted); font-size: 1.1rem;
      padding: 6px; border-radius: 8px; flex-shrink: 0;
      transition: color var(--transition), background var(--transition);
      display: flex; align-items: center;
    }
    #upload-btn-label:hover { color: var(--text); background: var(--surface2); }

    #send-btn {
      width: 36px; height: 36px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border: none; border-radius: 10px;
      color: #fff; font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 12px var(--accent-glow);
    }
    #send-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    #send-btn:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }

    #pdf-upload-input { display: none; }

    #input-hint {
      text-align: center; font-size: 0.7rem;
      color: var(--muted); margin-top: 8px;
    }

    /* Drop zone */
    #drop-zone {
      display: none; position: fixed; inset: 0;
      background: rgba(99,102,241,0.08);
      border: 2px dashed var(--accent);
      z-index: 200; align-items: center; justify-content: center;
      font-size: 1.2rem; color: #a5b4fc; font-weight: 600;
      pointer-events: none; backdrop-filter: blur(4px);
    }
    #drop-zone.active { display: flex; }

    /* Mobile overlay */
    #sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 49;
      backdrop-filter: blur(2px);
    }

    /* Animations */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
      40%           { opacity: 1;    transform: scale(1); }
    }

    /* Responsive */
    @media (max-width: 700px) {
      #sidebar {
        position: fixed; top: 0; left: 0; bottom: 0;
        transform: translateX(-100%);
        box-shadow: 4px 0 24px rgba(0,0,0,0.4);
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar-overlay.open { display: block; }
      #topbar { display: flex; }
      .bubble { max-width: 86%; }
    }
  </style>
</head>
<body>

<div id="drop-zone">📄 Drop PDF to upload</div>
<div id="sidebar-overlay"></div>

<!-- Sidebar -->
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div class="logo-text">
        <h2>AI Workspace</h2>
        <p>Your personal AI workspace.<br>Powered by multiple advanced models.</p>
      </div>
    </div>
    <button id="new-chat-btn">
      <span style="font-size:1rem">＋</span> New Chat
    </button>
  </div>

  <div class="sidebar-section-label">Recents</div>
  <div id="history-list"></div>

  <div class="sidebar-footer">
    <div class="setting-row">
      <div class="setting-label">Model</div>
      <select id="model-select">
        {% for model in models %}
        <option value="{{ model.id }}"{% if model.id == 'gpt-4o-mini' %} selected{% endif %}>{{ model.label }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
</aside>

<!-- Main -->
<div id="main">
  <!-- Mobile topbar -->
  <div id="topbar">
    <button id="sidebar-toggle">☰</button>
    <span id="topbar-title">AI Workspace</span>
  </div>

  <div id="pdf-badge">
    📄 <span id="pdf-name"></span>
    <button id="remove-pdf" title="Remove PDF">✕</button>
  </div>

  <div id="chat-window">
    <div id="welcome">
      <div class="welcome-icon">✦</div>
      <h2>AI Workspace</h2>
      <p>Your personal AI workspace.<br>Powered by multiple advanced models.</p>
    </div>
  </div>

  <div id="input-area">
    <div id="input-box">
      <label id="upload-btn-label" title="Upload PDF">
        📎
        <input type="file" id="pdf-upload-input" accept=".pdf" />
      </label>
      <textarea id="user-input" placeholder="Message AI…" rows="1"></textarea>
      <button id="send-btn" title="Send" disabled>
        &#9658;
      </button>
    </div>
    <div id="input-hint">Enter to send · Shift+Enter for new line · 📎 to upload PDF</div>
  </div>
</div>

<script>
  // ── DOM refs ────────────────────────────────────────────
  const sidebar        = document.getElementById("sidebar");
  const sidebarOverlay = document.getElementById("sidebar-overlay");
  const sidebarToggle  = document.getElementById("sidebar-toggle");
  const newChatBtn     = document.getElementById("new-chat-btn");
  const historyList    = document.getElementById("history-list");
  const modelSelect    = document.getElementById("model-select");
  const chatWindow     = document.getElementById("chat-window");
  const welcome        = document.getElementById("welcome");
  const userInput      = document.getElementById("user-input");
  const sendBtn        = document.getElementById("send-btn");
  const pdfInput       = document.getElementById("pdf-upload-input");
  const pdfBadge       = document.getElementById("pdf-badge");
  const pdfNameEl      = document.getElementById("pdf-name");
  const removePdfBtn   = document.getElementById("remove-pdf");
  const dropZone       = document.getElementById("drop-zone");

  // ── State ───────────────────────────────────────────────
  let history    = [];
  let pdfText    = "";
  let sessions   = JSON.parse(localStorage.getItem("ai_sessions") || "[]");
  let activeId   = null;

  // ── Sidebar toggle (mobile) ─────────────────────────────
  function openSidebar()  { sidebar.classList.add("open"); sidebarOverlay.classList.add("open"); }
  function closeSidebar() { sidebar.classList.remove("open"); sidebarOverlay.classList.remove("open"); }
  sidebarToggle.addEventListener("click", () => sidebar.classList.contains("open") ? closeSidebar() : openSidebar());
  sidebarOverlay.addEventListener("click", closeSidebar);

  // ── Chat history ─────────────────────────────────────────
  function saveSessions() { localStorage.setItem("ai_sessions", JSON.stringify(sessions)); }

  function renderHistory() {
    historyList.innerHTML = "";
    if (!sessions.length) {
      historyList.innerHTML = `<div class="history-empty">No chats yet.</div>`;
      return;
    }
    [...sessions].reverse().forEach(s => {
      const item = document.createElement("div");
      item.className = "history-item" + (s.id === activeId ? " active" : "");
      item.dataset.id = s.id;

      const title = document.createElement("span");
      title.className = "history-item-title";
      title.textContent = s.title || "New Chat";

      const del = document.createElement("button");
      del.className = "history-item-del";
      del.title = "Delete";
      del.textContent = "✕";
      del.addEventListener("click", (e) => { e.stopPropagation(); deleteSession(s.id); });

      item.appendChild(title);
      item.appendChild(del);
      item.addEventListener("click", () => loadSession(s.id));
      historyList.appendChild(item);
    });
  }

  function loadSession(id) {
    const s = sessions.find(s => s.id === id);
    if (!s) return;
    activeId = id;
    history  = [...s.messages];
    pdfText  = s.pdfText || "";

    if (pdfText && s.pdfName) {
      pdfNameEl.textContent = s.pdfName;
      pdfBadge.classList.add("visible");
    } else {
      pdfBadge.classList.remove("visible");
    }

    chatWindow.innerHTML = "";
    history.forEach(m => renderMessage(m.role, m.content, false));
    chatWindow.scrollTop = chatWindow.scrollHeight;
    renderHistory();
    closeSidebar();
  }

  function deleteSession(id) {
    sessions = sessions.filter(s => s.id !== id);
    saveSessions();
    if (activeId === id) startNewChat();
    else renderHistory();
  }

  function saveCurrentSession(firstUserMsg) {
    if (!activeId) {
      activeId = Date.now().toString();
      sessions.push({ id: activeId, title: firstUserMsg.slice(0, 40), messages: [], pdfText: "", pdfName: "" });
    }
    const s = sessions.find(s => s.id === activeId);
    if (s) {
      s.messages = [...history];
      s.pdfText  = pdfText;
      s.pdfName  = pdfNameEl.textContent;
    }
    saveSessions();
    renderHistory();
  }

  function startNewChat() {
    history  = [];
    pdfText  = "";
    activeId = null;
    pdfBadge.classList.remove("visible");
    pdfInput.value = "";
    chatWindow.innerHTML = "";
    chatWindow.appendChild(welcome);
    userInput.value = "";
    userInput.style.height = "auto";
    renderHistory();
    closeSidebar();
    userInput.focus();
  }

  newChatBtn.addEventListener("click", startNewChat);

  // ── Message rendering ─────────────────────────────────────
  function hideWelcome() {
    if (welcome.parentNode === chatWindow) chatWindow.removeChild(welcome);
  }

  function renderMessage(role, content, animate = true) {
    hideWelcome();
    if (role === "system-note") {
      const n = document.createElement("div");
      n.className = "system-note";
      n.textContent = content;
      chatWindow.appendChild(n);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return n;
    }
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;
    if (!animate) row.style.animation = "none";

    if (role === "assistant") {
      const av = document.createElement("div");
      av.className = "avatar ai-avatar";
      av.textContent = "✦";
      row.appendChild(av);
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return row;
  }

  function appendTyping() {
    hideWelcome();
    const row = document.createElement("div");
    row.className = "msg-row ai";
    const av = document.createElement("div");
    av.className = "avatar ai-avatar"; av.textContent = "✦";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    [0,1,2].forEach(() => { const d = document.createElement("span"); d.className = "typing-dot"; bubble.appendChild(d); });
    row.appendChild(av); row.appendChild(bubble);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return row;
  }

  // ── PDF upload ────────────────────────────────────────────
  async function uploadPdf(file) {
    if (!file?.name.toLowerCase().endsWith(".pdf")) {
      renderMessage("system-note", "⚠️ Only PDF files are supported.");
      return;
    }
    const note = renderMessage("system-note", `Uploading "${file.name}"…`);
    const form = new FormData();
    form.append("pdf", file);
    try {
      const res  = await fetch("/upload-pdf", { method: "POST", body: form });
      const data = await res.json();
      note.remove();
      if (data.error) {
        renderMessage("system-note", `⚠️ ${data.error}`);
      } else {
        pdfText = data.text;
        pdfNameEl.textContent = data.filename;
        pdfBadge.classList.add("visible");
        let msg = `📄 "${data.filename}" loaded (${data.pages} page${data.pages !== 1 ? "s" : ""}).`;
        if (data.truncated) msg += " Large file — first portion used.";
        renderMessage("system-note", msg + " Ask me anything about it.");
      }
    } catch {
      note.remove();
      renderMessage("system-note", "⚠️ Network error uploading PDF.");
    }
  }

  pdfInput.addEventListener("change", () => { if (pdfInput.files[0]) uploadPdf(pdfInput.files[0]); });
  removePdfBtn.addEventListener("click", () => {
    pdfText = ""; pdfInput.value = "";
    pdfBadge.classList.remove("visible");
    renderMessage("system-note", "PDF removed.");
  });

  // Drag & drop
  let dc = 0;
  document.addEventListener("dragenter", (e) => { if ([...e.dataTransfer.items].some(i => i.kind === "file")) { dc++; dropZone.classList.add("active"); } });
  document.addEventListener("dragleave", () => { if (--dc <= 0) { dc = 0; dropZone.classList.remove("active"); } });
  document.addEventListener("dragover", (e) => e.preventDefault());
  document.addEventListener("drop", (e) => { e.preventDefault(); dc = 0; dropZone.classList.remove("active"); const f = e.dataTransfer.files[0]; if (f) uploadPdf(f); });

  // ── Send message ──────────────────────────────────────────
  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || sendBtn.disabled) return;

    userInput.value = "";
    userInput.style.height = "auto";
    sendBtn.disabled = true;

    renderMessage("user", text);
    history.push({ role: "user", content: text });
    saveCurrentSession(text);

    const typing = appendTyping();

    try {
      const res  = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history, model: modelSelect.value, pdf_text: pdfText }),
      });
      const data = await res.json();
      typing.remove();

      if (data.error) {
        renderMessage("ai", `Error: ${data.error}`);
      } else {
        renderMessage("assistant", data.reply);
        history.push({ role: "assistant", content: data.reply });
        saveCurrentSession(text);
      }
    } catch {
      typing.remove();
      renderMessage("assistant", "Network error — please try again.");
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  sendBtn.addEventListener("click", sendMessage);
  userInput.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + "px";
    sendBtn.disabled = !userInput.value.trim();
  });

  // ── Init ──────────────────────────────────────────────────
  renderHistory();
</script>
</body>
</html>
